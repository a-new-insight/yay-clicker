<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <title>Yay Clicker</title>
  </head>
  <body>
    <div class="news">
      <p id="news-display">You live on a planet with no happiness.</p>
    </div>
    <div class="game">
      <h1 id="yay" onclick="incrementScore()">Yay!</h1>
      <p id="score-display">0 yays</p>
    </div>
    <div class="upgrades">
      <p>UPGRADES DONT WORK I WILL FIX IT SOON</p>
      <button onclick="buy(yippee)">Yippee - 15 yays - 0.1 yays per second</button>
      <button onclick="buy(yahoo)">Yahoo - 100 yays - 1 yay per second</button>
      <button onclick="buy(woo)">Woo - 1500 yays - 10 yays per second</button>
      <button onclick="buy(wahoo)">Wahoo - 20000 yays - +5% clickpower</button>
      <button onclick="buy(yippeekayay)">Yippee-Ka-Yay - 100,000 yays - 100 yays per second</button>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
